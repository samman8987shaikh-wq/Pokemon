<!-- PART 1: HTML Document Start & Meta Tags -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pokemon Battle Arena - Buy & Win Coins</title>
    <style>
</head>
<body>
<!-- PART 2: Global CSS Styles - Body & Game Container -->
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a472a, #0e2a1a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 48px;
            padding: 20px;
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
      <!-- PART 3: CSS Styles - Header & Coin Display -->
        .header {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            border-radius: 60px;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            box-shadow: 0 8px 0 #b4621a;
        }

        .coin-display {
            background: #2c2c2c;
            padding: 10px 25px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd966;
            box-shadow: inset 0 -2px 0 #555, 0 5px 10px rgba(0,0,0,0.2);
        }

        .coin-display span:first-child {
            font-size: 2rem;
        }

        .win-streak {
            background: #2c2c2c;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
        }
      <!-- PART 4: CSS Styles - Shop & Pokemon Cards -->
        .shop-section {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 25px;
            backdrop-filter: blur(8px);
        }

        .shop-title {
            color: gold;
            font-size: 1.5rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 5px solid gold;
            padding-left: 15px;
        }

        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .pokemon-card {
            background: linear-gradient(145deg, #3e2a1f, #2c1e14);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid #ffcc44;
            color: white;
            position: relative;
        }

        .pokemon-card.owned {
            border: 3px solid #4caf50;
            background: linear-gradient(145deg, #2a5a2a, #1e3a1e);
            cursor: default;
            opacity: 0.8;
        }

        .pokemon-card:not(.owned):hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border-color: #ffaa00;
        }
      <!-- PART 5: CSS Styles - Pokemon Card Details & Battle Arena -->
        .pokemon-avatar {
            font-size: 3.5rem;
        }

        .pokemon-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin: 8px 0;
        }

        .pokemon-stats {
            font-size: 0.75rem;
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 6px 0;
        }

        .price-tag {
            background: #ffb347;
            color: #2c2c2c;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 8px;
            display: inline-block;
        }

        .owned-badge {
            background: #4caf50;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 6px;
        }

        .battle-arena {
            background: linear-gradient(145deg, #5d3a1a, #3e2a1a);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 10px 20px rgba(0,0,0,0.3);
        }
      <!-- PART 6: CSS Styles - Fighters & HP Bars -->
        .fighters {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .fighter-card {
            flex: 1;
            min-width: 200px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 32px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 2px solid #ffcc88;
        }

        .fighter-emoji {
            font-size: 4rem;
        }

        .fighter-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            margin: 10px 0;
        }

        .hp-bar {
            background: #333;
            height: 20px;
            border-radius: 20px;
            overflow: hidden;
            margin: 10px 0;
        }

        .hp-fill {
            background: #e74c3c;
            width: 100%;
            height: 100%;
            transition: width 0.3s ease;
        }

        .vs {
            font-size: 2.5rem;
            font-weight: bold;
            color: gold;
            text-shadow: 2px 2px 0 black;
        }
      <!-- PART 7: CSS Styles - Move Buttons & Battle Log -->
        .moves-section {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 40px;
            padding: 20px;
        }

        .moves-title {
            color: white;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .move-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .move-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border: none;
            padding: 14px 28px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 5px 0 #8b2c00;
            flex: 1;
            min-width: 120px;
        }

        .move-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b2c00;
        }

        .move-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .reset-btn {
            background: linear-gradient(135deg, #4a4a4a, #2c2c2c);
            box-shadow: 0 5px 0 #1a1a1a;
        }

        .battle-log {
            margin-top: 20px;
            background: #1e1e1e;
            padding: 12px;
            border-radius: 24px;
            color: #ddd;
            font-size: 0.85rem;
            max-height: 100px;
            overflow-y: auto;
        }

        .message {
            padding: 5px;
            border-bottom: 1px solid #444;
        }
     <!-- PART 8: CSS Styles - Mobile Responsive & HTML Structure Start -->
        @media (max-width: 700px) {
            .fighters {
                flex-direction: column;
            }
            .vs {
                transform: rotate(90deg);
            }
            .move-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <!-- Header with coins and win streak -->
    <div class="header">
        <div class="coin-display">
            <span>🪙</span>
            <span id="coinAmount">0</span>
        </div>
        <div class="win-streak">
            🏆 Win Streak: <span id="winStreak">0</span>
        </div>
    </div>
  <!-- PART 9: HTML - Shop Section & Pokemon Grid -->
    <!-- Shop Section: Buy Pokemon -->
    <div class="shop-section">
        <div class="shop-title">
            <span>🛒</span> POKEMON SHOP - Win matches to earn coins & buy more!
        </div>
        <div class="pokemon-grid" id="pokemonGrid"></div>
        <div style="font-size: 0.8rem; color: #ffcc88; text-align: center;">⭐ Click on any Pokemon you don't own to purchase!</div>
    </div>
    <!-- PART 10: HTML - Battle Arena & Fighters -->
    <!-- Battle Arena -->
    <div class="battle-arena">
        <div class="fighters">
            <div class="fighter-card" id="playerFighter">
                <div class="fighter-emoji" id="playerEmoji">❓</div>
                <div class="fighter-name" id="playerName">No Pokemon</div>
                <div class="hp-bar"><div class="hp-fill" id="playerHpFill" style="width: 0%"></div></div>
                <div>❤️ <span id="playerHp">0</span> / <span id="playerMaxHp">0</span></div>
            </div>
            <div class="vs">⚔️ VS 🤖</div>
            <div class="fighter-card" id="botFighter">
                <div class="fighter-emoji" id="botEmoji">🤖</div>
                <div class="fighter-name" id="botName">Bot's Pokemon</div>
                <div class="hp-bar"><div class="hp-fill" id="botHpFill" style="width: 100%"></div></div>
                <div>❤️ <span id="botHp">0</span> / <span id="botMaxHp">0</span></div>
            </div>
        </div>
  <!-- PART 11: HTML - Move Buttons & Battle Log -->
        <!-- Moves & Play buttons -->
        <div class="moves-section">
            <div class="moves-title">⚡ CHOOSE YOUR MOVE ⚡</div>
            <div class="move-buttons">
                <button class="move-btn" id="move1" data-damage="35">🔥 EMBER - 35 dmg</button>
                <button class="move-btn" id="move2" data-damage="45">💧 WATER GUN - 45 dmg</button>
                <button class="move-btn" id="move3" data-damage="40">🌿 RAZOR LEAF - 40 dmg</button>
                <button class="move-btn reset-btn" id="resetBattleBtn">🔄 RESET BATTLE</button>
            </div>
            <div class="battle-log" id="battleLog">
                <div class="message">✨ Buy a Pokemon & fight the bot! ✨</div>
            </div>
        </div>
    </div>
</div>

<script>
<!-- PART 12: JavaScript - Pokemon Database (12 Pokemon) -->
        // ---------- POKEMON DATABASE (12 Pokemon) ----------
        const pokemonData = [
            { id: 1, name: "Charmander", emoji: "🔥", hp: 80, attack: 35, price: 50 },
            { id: 2, name: "Squirtle", emoji: "💧", hp: 85, attack: 30, price: 50 },
            { id: 3, name: "Bulbasaur", emoji: "🌿", hp: 85, attack: 32, price: 50 },
            { id: 4, name: "Pikachu", emoji: "⚡", hp: 70, attack: 45, price: 80 },
            { id: 5, name: "Jigglypuff", emoji: "🎵", hp: 100, attack: 25, price: 60 },
            { id: 6, name: "Geodude", emoji: "🪨", hp: 90, attack: 35, price: 55 },
            { id: 7, name: "Gastly", emoji: "👻", hp: 65, attack: 50, price: 90 },
            { id: 8, name: "Eevee", emoji: "🦊", hp: 75, attack: 40, price: 70 },
            { id: 9, name: "Snorlax", emoji: "😴", hp: 130, attack: 30, price: 120 },
            { id: 10, name: "Dragonite", emoji: "🐉", hp: 110, attack: 55, price: 150 },
            { id: 11, name: "Mewtwo", emoji: "🧬", hp: 120, attack: 60, price: 200 },
            { id: 12, name: "Lucario", emoji: "🥋", hp: 95, attack: 50, price: 130 }
        ];
<!-- PART 13: JavaScript - Game State Variables -->
        // Game state
        let coins = 100;    // start with 100 coins
        let ownedPokemonIds = []; // which pokemon player owns (by id)
        let selectedPokemonId = null; // the pokemon used for battle
        let battleActive = true;

        // Bot & player battle objects
        let playerBattle = { currentHp: 0, maxHp: 0, attack: 0, name: "", emoji: "" };
        let botBattle = { currentHp: 0, maxHp: 0, attack: 0, name: "", emoji: "" };
        
        let winStreak = 0;
<!-- PART 14: JavaScript - Helper Functions & UI Update -->
        // Helper Functions
        function updateUI() {
            document.getElementById("coinAmount").innerText = coins;
            document.getElementById("winStreak").innerText = winStreak;
            renderShop();
            renderBattleUI();
        }

        function getPokemonById(id) {
            return pokemonData.find(p => p.id === id);
        }

        function addLogMessage(msg, color = "#ddd") {
            const logDiv = document.getElementById("battleLog");
            const messageDiv = document.createElement("div");
            messageDiv.className = "message";
            messageDiv.style.color = color;
            messageDiv.innerText = msg;
            logDiv.appendChild(messageDiv);
            logDiv.scrollTop = logDiv.scrollHeight;
            if (logDiv.children.length > 12) {
                logDiv.removeChild(logDiv.children[0]);
            }
        }
  <!-- PART 15: JavaScript - Shop & Buy Pokemon Logic -->
        function renderShop() {
            const grid = document.getElementById("pokemonGrid");
            grid.innerHTML = "";
            pokemonData.forEach(pokemon => {
                const owned = ownedPokemonIds.includes(pokemon.id);
                const card = document.createElement("div");
                card.className = `pokemon-card ${owned ? 'owned' : ''}`;
                card.innerHTML = `
                    <div class="pokemon-avatar">${pokemon.emoji}</div>
                    <div class="pokemon-name">${pokemon.name}</div>
                    <div class="pokemon-stats">❤️ ${pokemon.hp}  ⚔️ ${pokemon.attack}</div>
                    ${!owned ? `<div class="price-tag">🪙 ${pokemon.price}</div>` : `<div class="owned-badge">✅ OWNED</div>`}
                `;
                if (!owned) {
                    card.style.cursor = "pointer";
                    card.addEventListener("click", (e) => {
                        e.stopPropagation();
                        buyPokemon(pokemon.id, pokemon.price);
                    });
                }
                grid.appendChild(card);
            });
        }

        function buyPokemon(pokemonId, price) {
            if (ownedPokemonIds.includes(pokemonId)) {
                addLogMessage("❌ You already own this Pokemon!", "#ff8888");
                return;
            }
            if (coins >= price) {
                coins -= price;
                ownedPokemonIds.push(pokemonId);
                addLogMessage(`🎉 Purchased ${pokemonData.find(p => p.id === pokemonId).name}!`, "#aaffaa");
                if (selectedPokemonId === null || !ownedPokemonIds.includes(selectedPokemonId)) {
                    if (ownedPokemonIds.length > 0) {
                        selectedPokemonId = ownedPokemonIds[0];
                        addLogMessage(`✨ ${getPokemonById(selectedPokemonId).name} is now your battle Pokemon!`, "#ffcc88");
                    }
                }
                updateUI();
                startNewBattle();
            } else {
                addLogMessage(`💰 Not enough coins! Need ${price} coins. Win battles to earn coins!`, "#ffaaaa");
            }
          }
<!-- PART 16: JavaScript - Battle Start & Bot Logic -->
        function getRandomBotPokemon() {
            const randomIndex = Math.floor(Math.random() * pokemonData.length);
            return { ...pokemonData[randomIndex] };
        }

        function startNewBattle() {
            if (!selectedPokemonId || ownedPokemonIds.length === 0) {
                playerBattle = { currentHp: 0, maxHp: 0, attack: 0, name: "???", emoji: "❌" };
                const botPoke = getRandomBotPokemon();
                botBattle = {
                    currentHp: botPoke.hp,
                    maxHp: botPoke.hp,
                    attack: botPoke.attack,
                    name: botPoke.name,
                    emoji: botPoke.emoji
                };
                battleActive = false;
                renderBattleUI();
                return;
            }
            const playerPoke = getPokemonById(selectedPokemonId);
            playerBattle = {
                currentHp: playerPoke.hp,
                maxHp: playerPoke.hp,
                attack: playerPoke.attack,
                name: playerPoke.name,
                emoji: playerPoke.emoji
            };
            const botPoke = getRandomBotPokemon();
            botBattle = {
                currentHp: botPoke.hp,
                maxHp: botPoke.hp,
                attack: botPoke.attack,
                name: botPoke.name,
                emoji: botPoke.emoji
            };
            battleActive = true;
            addLogMessage(`⚔️ Battle start! Your ${playerPoke.name} vs Bot's ${botPoke.name}!`, "#ccccff");
            renderBattleUI();
        }
  <!-- PART 17: JavaScript - Render Battle UI (HP Bars & Names) -->
        function renderBattleUI() {
            const playerNameElem = document.getElementById("playerName");
            const playerEmojiElem = document.getElementById("playerEmoji");
            const playerHpSpan = document.getElementById("playerHp");
            const playerMaxHpSpan = document.getElementById("playerMaxHp");
            const playerHpFill = document.getElementById("playerHpFill");
            
            playerNameElem.innerText = playerBattle.name;
            playerEmojiElem.innerText = playerBattle.emoji || "❌";
            playerHpSpan.innerText = playerBattle.currentHp;
            playerMaxHpSpan.innerText = playerBattle.maxHp;
            let playerPercent = (playerBattle.currentHp / playerBattle.maxHp) * 100;
            playerHpFill.style.width = (playerPercent > 0 ? playerPercent : 0) + "%";
            
            const botNameElem = document.getElementById("botName");
            const botEmojiElem = document.getElementById("botEmoji");
            const botHpSpan = document.getElementById("botHp");
            const botMaxHpSpan = document.getElementById("botMaxHp");
            const botHpFill = document.getElementById("botHpFill");
            
            botNameElem.innerText = botBattle.name;
            botEmojiElem.innerText = botBattle.emoji;
            botHpSpan.innerText = botBattle.currentHp;
            botMaxHpSpan.innerText = botBattle.maxHp;
            let botPercent = (botBattle.currentHp / botBattle.maxHp) * 100;
            botHpFill.style.width = (botPercent > 0 ? botPercent : 0) + "%";
            
            const moveBtns = document.querySelectorAll('.move-btn:not(.reset-btn)');
            moveBtns.forEach(btn => {
                if (!battleActive || playerBattle.currentHp <= 0 || botBattle.currentHp <= 0) {
                    btn.disabled = true;
                } else {
                    btn.disabled = false;
                }
            });
        }
  <!-- PART 18: JavaScript - Player Move & Attack Logic -->
        async function playerMove(playerDamage) {
            if (!battleActive) {
                addLogMessage("Battle is over! Press RESET to fight again!", "#ffaaaa");
                return;
            }
            if (playerBattle.currentHp <= 0) {
                addLogMessage("Your Pokemon is fainted! Reset battle.", "#ff8888");
                return;
            }
            if (botBattle.currentHp <= 0) {
                addLogMessage("Bot already defeated! Reset battle", "#ffaa88");
                return;
            }
            
            let damage = playerDamage + Math.floor(Math.random() * 10);
            damage = Math.min(damage, botBattle.currentHp);
            botBattle.currentHp -= damage;
            addLogMessage(`💥 ${playerBattle.name} deals ${damage} damage to ${botBattle.name}!`, "#ffaa66");
            renderBattleUI();
            
            if (botBattle.currentHp <= 0) {
                botBattle.currentHp = 0;
                renderBattleUI();
                addLogMessage(`🏆 Victory! You defeated ${botBattle.name}! +50 coins!`, "gold");
                coins += 50;
                winStreak++;
                updateUI();
                battleActive = false;
                renderBattleUI();
                addLogMessage("🔄 Press RESET BATTLE to fight a new opponent!", "#88ff88");
                return;
            }
            
            if (botBattle.currentHp > 0 && playerBattle.currentHp > 0) {
                await new Promise(r => setTimeout(r, 300));
                let botDamage = botBattle.attack + Math.floor(Math.random() * 12);
                botDamage = Math.min(botDamage, playerBattle.currentHp);
                playerBattle.currentHp -= botDamage;
                addLogMessage(`🤖 ${botBattle.name} attacks with ${botDamage} damage!`, "#ff8888");
                renderBattleUI();
                
                if (playerBattle.currentHp <= 0) {
                    playerBattle.currentHp = 0;
                    renderBattleUI();
                    addLogMessage(`💀 You lost... ${playerBattle.name} fainted. Win streak reset.`, "#ff5555");
                    winStreak = 0;
                    updateUI();
                    battleActive = false;
                    renderBattleUI();
                }
            }
        }
  <!-- PART 19: JavaScript - Reset Battle & Event Listeners -->
        function resetBattle() {
            if (selectedPokemonId === null && ownedPokemonIds.length > 0) {
                selectedPokemonId = ownedPokemonIds[0];
            }
            startNewBattle();
            addLogMessage("🔄 Battle reset! Fight again!", "#aaffdd");
        }

        // Attach event listeners for move buttons
        document.getElementById("move1").addEventListener("click", () => playerMove(35));
        document.getElementById("move2").addEventListener("click", () => playerMove(45));
        document.getElementById("move3").addEventListener("click", () => playerMove(40));
        document.getElementById("resetBattleBtn").addEventListener("click", () => resetBattle());
  <!-- PART 20: JavaScript - Game Initialization & End -->
        // Initialize game: give starter Pokemon (Charmander free)
        function initGame() {
            if (ownedPokemonIds.length === 0) {
                ownedPokemonIds.push(1); // Charmander free
            }
            selectedPokemonId = 1;
            coins = 100;
            winStreak = 0;
            updateUI();
            startNewBattle();
        }
        
        initGame();
    </script>
</body>
</html>
